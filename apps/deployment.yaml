apiVersion: apps/v1
kind: Deployment
metadata:
  name: gitops-app
  namespace: default
spec:
  replicas: 2
  selector:
    matchLabels:
      app: gitops-app
  template:
    metadata:
      labels:
        app: gitops-app
    spec:
      containers:
      - name: app
        image: ghcr.io/rupshinde87/gitops-app:v1.0.1 # {"$imagepolicy": "flux-system:gitops-app"}
        ports:
        - containerPort: 8080
        readinessProbe:
          httpGet:
            path: /
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: gitops-app
  namespace: default
spec:
  selector:
    app: gitops-app
  ports:
  - port: 80
    targetPort: 8080
